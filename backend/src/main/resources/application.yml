spring:
  application:
    name: finance-tracker

  datasource:
    url: jdbc:postgresql://localhost:5433/finance_tracker
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081

app:
  jwt:
    secret: 404e635266556a586e3272357538782f413f4428472b4b6250645367566b5970337336763979244226452948404d635166546a576e5a7234753778214125442a47
    expiration-ms: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
